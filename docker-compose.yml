services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dh_mdm
      POSTGRES_USER: dh_mdm
      POSTGRES_PASSWORD: dh_mdm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg://dh_mdm:dh_mdm@postgres:5432/dh_mdm
      REDIS_URL: redis://redis:6379/0
      JWT_ISSUER: https://login.microsoftonline.com/common/v2.0
      JWT_AUDIENCE: api://dh-mdm
      JWT_JWKS_URL: https://login.microsoftonline.com/common/discovery/v2.0/keys
      SESSION_SECRET: change-me
      FILEVAULT_KEK: change-me-32-byte-minimum-secret
      PUBLIC_BASE_URL: http://localhost:8000
      MDM_ORGANIZATION: DH Website Services
      MDM_TOPIC: com.apple.mgmt.External.REPLACE_ME
      MDM_SERVER_URL: http://localhost:8000/api/v1/mdm/connect
      MDM_CHECKIN_URL: http://localhost:8000/api/v1/mdm/checkin
      MDM_SCEP_URL: http://localhost:8000/scep
      MDM_SCEP_CHALLENGE: replace-me
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg://dh_mdm:dh_mdm@postgres:5432/dh_mdm
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  backend_data:
