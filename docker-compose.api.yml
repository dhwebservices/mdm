services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dh_mdm
      POSTGRES_USER: dh_mdm
      POSTGRES_PASSWORD: dh_mdm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://dh_mdm:dh_mdm@postgres:5432/dh_mdm
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - backend_data:/app/data

  worker:
    build: ./backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://dh_mdm:dh_mdm@postgres:5432/dh_mdm
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - backend_data:/app/data

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/api-nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  backend_data:
